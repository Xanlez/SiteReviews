<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ restaurant.name }} — Отзывы</title>
    <style>
        :root { --green: #27ae60; --light-bg: #f9fafb; --border: #e5e7eb; }
        body { font-family: -apple-system, sans-serif; background: var(--light-bg); margin: 0; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { text-align: center; color: var(--green); }
        .form-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .rating-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .rating-group input { display: none; }
        .rating-group label { flex: 1; text-align: center; padding: 10px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; color: #666; }
        .rating-group input:checked + label { background: var(--green); color: white; border-color: var(--green); }
        .btn { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .review { background: white; padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .rev-head { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        .stars { color: var(--green); }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ restaurant.name }}</h1>
        <div class="form-card">
            <form action="/add_review/{{ restaurant.slug }}" method="post">
                <input type="text" name="user_name" placeholder="Ваше имя" required>
                <div class="rating-group">
                    {% for i in range(1, 6) %}
                    <input type="radio" name="rating" value="{{ i }}" id="r{{ i }}" {% if i == 5 %}checked{% endif %}>
                    <label for="r{{ i }}">{{ i }}</label>
                    {% endfor %}
                </div>
                <textarea name="text" rows="3" placeholder="Ваш отзыв..." required></textarea>
                <button type="submit" class="btn">Отправить</button>
            </form>
        </div>
        {% for review in reviews %}
        <div class="review">
            <div class="rev-head">
                <span>{{ review.user_name }}</span>
                <span class="stars">{{ review.rating }} ⭐</span>
            </div>
            <p style="margin: 0; color: #444;">{{ review.text }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
